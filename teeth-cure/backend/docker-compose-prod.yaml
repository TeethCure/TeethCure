services:
  # 1. 백엔드 애플리케이션
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teeth-cure-app
    ports:
      - "${APP_PORT}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://teeth-cure-db:3306/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - access-token-expiration-millis=${EXPIRATION_MILLIS}
      - secret-key=${SECRET_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql-db:
        condition: service_healthy
    networks:
      - app-network
  
  # 2. MySQL (데이터베이스)
  mysql-db:
    image: mysql:8.0
    container_name: teeth-cure-db
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: Asia/Seoul
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p${DB_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge